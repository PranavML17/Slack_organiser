<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Daybook</title>
<style>
  body{font-family:-apple-system,Segoe UI,Inter,sans-serif;background:#111827;color:#E5E7EB;
       max-width:640px;margin:60px auto;padding:0 20px;line-height:1.5;}
  h1{font-size:26px;margin-bottom:4px;}
  p.sub{color:#9CA3AF;margin-top:0;}
  .card{background:#1F2937;border:1px solid #374151;border-radius:10px;padding:20px;margin:20px 0;}
  .status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:600;}
  .status.on{background:#064E3B;color:#6EE7B7;}
  .status.off{background:#450A0A;color:#FCA5A5;}
  a.btn{display:inline-block;background:#4F46E5;color:#fff;padding:10px 18px;border-radius:8px;
        text-decoration:none;font-weight:600;font-size:14px;}
  button{background:#374151;color:#E5E7EB;border:1px solid #4B5563;border-radius:8px;padding:8px 14px;
         cursor:pointer;font-size:13px;margin-right:8px;}
  pre{background:#0B1220;padding:12px;border-radius:8px;overflow:auto;font-size:12px;}
</style>
</head>
<body>
  <h1>Daybook</h1>
  <p class="sub">Slack → Google Sheets: daily tasks, mention counts, thread transcripts.</p>

  <div class="card">
    <div id="statusLine">Checking connection…</div>
    <div style="margin-top:12px;" id="connectBox"></div>
  </div>

  <div class="card">
    <strong>Manual run (for testing)</strong>
    <div style="margin-top:10px;">
      <button onclick="run('task-sync')">Run task sync</button>
      <button onclick="run('mention-scan')">Run mention scan</button>
    </div>
    <pre id="runOutput" style="display:none;"></pre>
  </div>

  <script>
    async function loadStatus(){
      const res = await fetch('/api/status');
      const data = await res.json();
      const line = document.getElementById('statusLine');
      const box = document.getElementById('connectBox');
      if(data.connected){
        var who = data.slackUserName || data.slackUserId;
        line.innerHTML = 'Slack: <span class="status on">connected</span> — ' + who + (data.teamName ? ' on ' + data.teamName : '');
        box.innerHTML = '';
      } else {
        line.innerHTML = 'Slack: <span class="status off">not connected</span>';
        box.innerHTML = '<a class="btn" href="/connect/slack">Connect Slack</a>';
      }
    }
    async function run(job){
      const out = document.getElementById('runOutput');
      out.style.display = 'block';
      out.textContent = 'Running…';
      try{
        const res = await fetch('/api/run/' + job, { method:'POST' });
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
      }catch(e){
        out.textContent = 'Failed: ' + e.message;
      }
    }
    loadStatus();
  </script>
</body>
</html>
